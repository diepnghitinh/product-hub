# nginx config for docker-compose (single-origin topology).
#
# Identical to frontend/nginx.conf, but with the "/v1 → api" reverse proxy
# ENABLED so the web container forwards API calls to the `api` service over the
# compose network. The frontend image's own nginx.conf stays production-clean
# (there an external ingress does the routing); compose bind-mounts this over it.

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Client-side routing: unknown paths fall back to the SPA shell.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Hashed build assets are immutable — cache them hard; never cache the shell.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  # Same-origin API: forward /v1/* to the api service. No trailing slash on
  # proxy_pass, so the full /v1/... path is preserved (the API is versioned there).
  location /v1/ {
    proxy_pass         http://api:3000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    # Attachment uploads can be a few MB (see MAX_REQUEST_BODY_SIZE on the API).
    client_max_body_size 15m;
  }

  gzip on;
  gzip_comp_level 6;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;

  # Basic hardening.
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
}
