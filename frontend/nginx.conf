server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Client-side routing: unknown paths fall back to the SPA shell.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Hashed build assets are immutable — cache them hard; never cache the shell.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  # Same-origin API (only needed if you built with VITE_API_URL=/v1 and want
  # nginx — rather than an external ingress — to reach the API). Uncomment and
  # point it at your backend service:
  #
  # location /v1/ {
  #   proxy_pass         http://api:3000;
  #   proxy_http_version 1.1;
  #   proxy_set_header   Host              $host;
  #   proxy_set_header   X-Real-IP         $remote_addr;
  #   proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
  #   proxy_set_header   X-Forwarded-Proto $scheme;
  # }

  gzip on;
  gzip_comp_level 6;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;

  # Basic hardening.
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
}
